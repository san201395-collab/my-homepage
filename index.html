<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>다람쥐의 움직이는 집 🐿️</title>
    <style>
      /* 기본 초기화 */
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'sans-serif';
        overflow: hidden;
      }

      /* 비디오 배경 */
      .video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      #bg-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* 콘텐츠 레이어 */
      .content-overlay {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);

        /* ⭐ 요청하신 부분: 전체를 왼쪽으로 25px 이동 */
        transform: translateX(-25px);
      }

      /* 카드 디자인 */
      .card {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .btn {
        margin-top: 20px;
        padding: 12px 30px;
        background-color: #d2691e;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
      }

      h1 { margin: 10px 0; }
    </style>
  </head>
  <body>
    <div class="video-background">
      <video autoplay muted loop playsinline id="bg-video">
        <source src="https://edgio.clien.net/F01/13200194/32026cf1d7ab35.mp4" type="video/mp4">
        브라우저가 비디오를 지원하지 않습니다.
      </video>
    </div>

    <div class="content-overlay">
      <header>
        <div class="squirrel-icon" style="font-size: 60px;">🐿️</div>
        <h1>움직이는 다람쥐 숲</h1>
        <p>비디오 배경이 적용된 멋진 홈페이지입니다!</p>
      </header>

      <main class="container">
        <section class="card">
          <h2>숲속 라이브 🌿</h2>
          <p>배경에서 다람쥐가 움직이고 있어요.</p>
          <button id="acornBtn" class="btn">도토리 선물하기 🌰</button>
          <p id="message"></p>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
